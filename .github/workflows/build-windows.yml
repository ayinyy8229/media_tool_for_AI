name: 打包 Windows EXE 并发布

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pillow moviepy pyinstaller

      - name: 打包单文件 EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --collect-all customtkinter
          --collect-all moviepy
          --collect-all imageio
          --collect-all imageio_ffmpeg
          --collect-all proglog
          --hidden-import=PIL._tkinter_finder
          --hidden-import=tkinter
          --hidden-import=tkinter.filedialog
          --hidden-import=tkinter.messagebox
          --name "媒体批量处理工具"
          media_tool.py

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新版本
          files: dist/媒体批量处理工具.exe
          body: |
            Windows 用户直接下载 `媒体批量处理工具.exe` 双击运行，无需安装任何环境。
          prerelease: false
